services:
  skystate_proxy:
    image: nginx:alpine
    container_name: skystate_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [ skystate_api, skystate_dashboard ]
    restart: unless-stopped
    networks:
      - skystate


  skystate_api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: skystate_api
    user: "${UID:-1000}:${GID:-1000}"
    restart: always
    env_file:
      - .env.local
    environment:
      - ConnectionStrings__DefaultConnection=Host=skystate_db;Database=skystate;Username=admin;Password=admin
      - GitHub__ClientId=${GITHUB_CLIENT_ID}
      - GitHub__ClientSecret=${GITHUB_CLIENT_SECRET}
      - GitHub__CallbackUrl=http://localhost:8080/api/auth/github/callback
      - HTTP_PORTS=
      - HTTPS_PORTS=
    volumes:
      - ./api:/app
      - api_obj:/app/SkyState.Api/obj
      - /home/user/.aspnet/DataProtection-Keys:/home/user/.aspnet/DataProtection-Keys
      - /home/user/.nuget/packages:/home/user/.nuget/packages
    working_dir: /app
    expose:
      - "5148"
    command: dotnet watch --project ./SkyState.Api/SkyState.Api.csproj --non-interactive
    networks:
      - skystate


  skystate_dashboard:
    image: node:25-slim
    container_name: skystate_dashboard
    user: "${UID:-1000}:${GID:-1000}"
    restart: always
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_TEST_MODE=true
      - VITE_TEST_GITHUB_ID=gh_dev_12345
      - VITE_TEST_EMAIL=dev@example.com
      - VITE_TEST_NAME=Dev User
      - API_PROXY_TARGET=http://skystate_api:5148
    volumes:
      - ./dashboard:/app
    working_dir: /app
    expose:
      - "5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - skystate


  skystate_stripe:
    image: stripe/stripe-cli:latest
    container_name: skystate_stripe
    restart: unless-stopped
    env_file:
      - .env.local
    command: listen --api-key ${STRIPE_API_KEY} --forward-to http://skystate_api:5148/webhooks/stripe --log-level info
    depends_on: [ skystate_api ]
    networks:
      - skystate


volumes:
  api_obj:

networks:
  skystate:
    external: true

