name: Deploy Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  GCP_PROJECT_ID: skystate-staging
  GCP_REGION: europe-west1
  WIF_PROVIDER: 'projects/123212194289/locations/global/workloadIdentityPools/github/providers/github-actions'
  SERVICE_ACCOUNT: 'skystate-deploy@skystate-staging.iam.gserviceaccount.com'
  AR_REPOSITORY: skystate-api
  IMAGE_NAME: api
  CLOUD_SQL_INSTANCE: skystate-staging:europe-west1:skystate-db
  CLOUD_SQL_INSTANCE_NAME: skystate-db
  SERVICE_NAME: skystate-api

jobs:
  tests:
    name: Tests
    uses: ./.github/workflows/workflow-test.yml

  migrate-db:
    name: Migrate Database
    needs: tests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create migration bucket
        id: bucket
        run: |
          BUCKET="gs://${{ env.GCP_PROJECT_ID }}-migration-${GITHUB_SHA:0:7}"
          gcloud storage buckets create "$BUCKET" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --location="${{ env.GCP_REGION }}"
          echo "name=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Upload schema
        run: |
          gcloud storage cp api/Database/installation.sql \
            "${{ steps.bucket.outputs.name }}/installation.sql"

      - name: Upload migrations
        run: |
          gcloud storage cp api/Database/migrations.sql \
            "${{ steps.bucket.outputs.name }}/migrations.sql"

      - name: Grant Cloud SQL instance SA read access
        run: |
          INSTANCE_SA=$(gcloud sql instances describe ${{ env.CLOUD_SQL_INSTANCE_NAME }} \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --format="value(serviceAccountEmailAddress)")
          gcloud storage buckets add-iam-policy-binding "${{ steps.bucket.outputs.name }}" \
            --member="serviceAccount:${INSTANCE_SA}" \
            --role="roles/storage.objectViewer"

      - name: Wait for IAM propagation
        run: sleep 10

      - name: Import schema
        run: |
          gcloud sql import sql ${{ env.CLOUD_SQL_INSTANCE_NAME }} \
            "${{ steps.bucket.outputs.name }}/installation.sql" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --database=skystate \
            --user=skystate \
            --quiet

      - name: Import migrations
        run: |
          gcloud sql import sql ${{ env.CLOUD_SQL_INSTANCE_NAME }} \
            "${{ steps.bucket.outputs.name }}/migrations.sql" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --database=skystate \
            --user=skystate \
            --quiet

      - name: Cleanup migration bucket
        if: always()
        run: gcloud storage rm -r "${{ steps.bucket.outputs.name }}" 2>/dev/null || true

  build-push-api:
    name: Build & Push API Image
    needs: tests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: api/
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image in Artifact Registry
        run: |
          gcloud artifacts docker images list \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }} \
            --include-tags \
            --filter="tags=${{ inputs.environment }}-${{ github.sha }}" \
            --format="table(package,tags,createTime)"

  deploy-api:
    name: Deploy API to Cloud Run
    needs: [build-push-api, migrate-db]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --service-account="${{ env.SERVICE_ACCOUNT }}" \
            --port=5148 \
            --add-cloudsql-instances="${{ env.CLOUD_SQL_INSTANCE }}" \
            --set-secrets="DB_PASSWORD=skystate-db-password:latest,GitHub__ClientId=skystate-github-client-id:latest,GitHub__ClientSecret=skystate-github-client-secret:latest,Stripe__SecretKey=skystate-stripe-secret-key:latest,Stripe__WebhookSecret=skystate-stripe-webhook-secret:latest,Stripe__HobbyPriceId=skystate-stripe-hobby-price-id:latest,Stripe__ProPriceId=skystate-stripe-pro-price-id:latest,Stripe__BoostPriceId=skystate-stripe-boost-price-id:latest,Jwt__SigningKey=skystate-jwt-signing-key:latest" \
            --set-env-vars="INSTANCE_UNIX_SOCKET=/cloudsql/${{ env.CLOUD_SQL_INSTANCE }},DB_NAME=skystate,DB_USER=skystate,GitHub__CallbackUrl=https://staging-api.skystate.io/auth/github/callback,GitHub__FrontendUrl=https://staging-app.skystate.io" \
            --min-instances=0 \
            --max-instances=1 \
            --memory=512Mi \
            --cpu=1 \
            --allow-unauthenticated \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "Cloud Run URL: ${URL}"
          echo "Testing health endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health" --max-time 30)
          if [ "${STATUS}" = "200" ]; then
            echo "Health check passed (HTTP ${STATUS})"
          else
            echo "Health check failed (HTTP ${STATUS})"
            exit 1
          fi

  deploy-dashboard:
    name: Deploy Dashboard to Firebase
    needs: tests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Build dashboard
        run: cd dashboard && npm run build
        env:
          VITE_API_BASE_URL: https://staging-api.skystate.io

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy dashboard to Firebase Hosting
        run: firebase deploy --only hosting:dashboard --project ${{ env.GCP_PROJECT_ID }}

  deploy-landing:
    name: Deploy Landing to Firebase
    needs: tests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy landing to Firebase Hosting
        run: firebase deploy --only hosting:landing --project ${{ env.GCP_PROJECT_ID }}
